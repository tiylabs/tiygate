name: Build and Push Image

on:
  release:
    types: [prereleased, released]

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Get release tag
        id: get-tag
        shell: bash
        run: echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push (single platform)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          build-args: |
            APP_VERSION=${{ steps.get-tag.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,scope=${{ matrix.suffix }},mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:${{ steps.get-tag.outputs.tag }}-${{ matrix.suffix }}

  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Get release tag
        id: get-tag
        shell: bash
        run: echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Merge multi-arch manifest
        shell: bash
        env:
          REPO: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
          TAG: ${{ steps.get-tag.outputs.tag }}
        run: |
          docker buildx imagetools create -t "$REPO:$TAG" "$REPO:$TAG-amd64" "$REPO:$TAG-arm64"
      - name: Tag latest (release only)
        if: github.event.action == 'released'
        shell: bash
        env:
          REPO: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
          TAG: ${{ steps.get-tag.outputs.tag }}
        run: |
          docker buildx imagetools create -t "$REPO:latest" "$REPO:$TAG"
