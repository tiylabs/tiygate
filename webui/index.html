<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#1f2937" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TiyGate Admin</title>
    <script>
      (() => {
        const storageKey = "tiygate.theme";
        const lightBg = "#f7f8fa";
        const darkBg = "#0a0c14";

        let saved = null;
        try {
          saved = window.localStorage.getItem(storageKey);
        } catch {
          saved = null;
        }

        // Determine the resolved theme mode (light/dark) before React mounts
        // so the window background — and the macOS titlebar overlay — matches
        // the user's theme preference immediately on launch.
        let isDark = false;
        if (saved === "dark" || saved === "dark-dim" || saved === "dark-oled" ||
            saved === "dark-lime" || saved === "dark-fuchsia" || saved === "dark-mauve") {
          isDark = true;
        } else if (saved === "light" || saved === "light-warm" || saved === "light-slate" ||
                   saved === "light-lime" || saved === "light-fuchsia" || saved === "light-mauve") {
          isDark = false;
        } else {
          isDark = typeof window.matchMedia === "function" &&
                   window.matchMedia("(prefers-color-scheme: dark)").matches;
        }

        const root = document.documentElement;
        const theme = isDark ? "dark" : "light";
        root.setAttribute("data-theme", theme);
        root.style.colorScheme = theme;
        root.style.backgroundColor = isDark ? darkBg : lightBg;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
